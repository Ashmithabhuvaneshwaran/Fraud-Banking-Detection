<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AI Fraud Detection</title>
  <meta name="description" content="Create your account on the AI-Powered Bank Transaction Fraud Detection System"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

<div class="auth-bg">
  <div class="auth-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="auth-container">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>FraudGuard AI</h1>
    <p>Create your secure account</p>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <h2 class="auth-form-title">Create Account</h2>
    <p class="auth-form-sub">Join the fraud detection platform</p>

    <!-- Alert -->
    <div class="auth-alert" id="registerAlert"><span></span></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="regUsername">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" id="regUsername" class="auth-input"
                 placeholder="Choose a username" autocomplete="username" required/>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="regEmail">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input type="email" id="regEmail" class="auth-input"
                 placeholder="your@email.com" autocomplete="email" required/>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="regPassword">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="regPassword" class="auth-input"
                 placeholder="Min. 6 characters" autocomplete="new-password" required/>
          <button type="button" class="toggle-password" onclick="togglePwd('regPassword')">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label" for="regConfirm">Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="regConfirm" class="auth-input"
                 placeholder="Repeat password" autocomplete="new-password" required/>
          <button type="button" class="toggle-password" onclick="togglePwd('regConfirm')">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <!-- Role Selection -->
      <div class="form-group">
        <label class="form-label">Account Role</label>
        <div class="role-group">
          <div>
            <input type="radio" name="role" id="roleUser" value="USER" class="role-option" checked/>
            <label for="roleUser" class="role-label">
              <span class="role-icon">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <span>User</span>
              <small style="font-size:10px;color:var(--text-muted);font-weight:400">Submit &amp; view</small>
            </label>
          </div>
          <div>
            <input type="radio" name="role" id="roleAdmin" value="ADMIN" class="role-option"/>
            <label for="roleAdmin" class="role-label">
              <span class="role-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </span>
              <span>Admin</span>
              <small style="font-size:10px;color:var(--text-muted);font-weight:400">Full access</small>
            </label>
          </div>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="registerBtn">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div class="auth-switch">
      Already have an account? <a onclick="location.href='login.html'">Sign in &rarr;</a>
    </div>
  </div>

  <!-- Features -->
  <div class="auth-features">
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      ML-Powered Detection
    </div>
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      BCrypt Hashed
    </div>
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Role-Based Access
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (localStorage.getItem('authToken')) location.href = 'dashboard.html';

  function togglePwd(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
