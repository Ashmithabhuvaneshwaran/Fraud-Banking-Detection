<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — AI Fraud Detection</title>
  <meta name="description" content="Sign in to the AI-Powered Bank Transaction Fraud Detection System"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

<div class="auth-bg">
  <div class="auth-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="auth-container">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>FraudGuard AI</h1>
    <p>AI-Powered Transaction Security Platform</p>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabUser"  onclick="switchTab('user')">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        User Login
      </button>
      <button class="auth-tab"        id="tabAdmin" onclick="switchTab('admin')">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Admin Login
      </button>
    </div>

    <!-- Alert -->
    <div class="auth-alert" id="loginAlert"><span></span></div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <h2 class="auth-form-title" id="loginTitle">Welcome Back</h2>
      <p class="auth-form-sub">Sign in to monitor your transactions</p>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="loginUsername">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" id="loginUsername" class="auth-input"
                 placeholder="Enter your username" autocomplete="username" required/>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="loginPassword" class="auth-input"
                 placeholder="Enter your password" autocomplete="current-password" required/>
          <button type="button" class="toggle-password" onclick="togglePwd('loginPassword')">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>


      <button type="submit" class="auth-btn" id="loginBtn">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div class="auth-switch">
      Don't have an account? <a onclick="location.href='register.html'">Create one &rarr;</a>
    </div>
  </div>

  <!-- Features -->
  <div class="auth-features">
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      ML-Powered Detection
    </div>
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      JWT Secured
    </div>
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Real-time Analytics
    </div>
    <div class="auth-feature">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Dark Mode
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('authToken')) location.href = 'dashboard.html';

  let currentTab = 'user';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabUser').classList.toggle('active', tab === 'user');
    document.getElementById('tabAdmin').classList.toggle('active', tab === 'admin');

    if (tab === 'admin') {
      document.getElementById('loginTitle').textContent = 'Admin Access';
    } else {
      document.getElementById('loginTitle').textContent = 'Welcome Back';
    }
  }

  function togglePwd(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
